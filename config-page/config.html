        <form id="config-form">
            <!-- Theme Section -->
            <section class="config-section">
                <h2>Theme</h2>
                
                <div class="form-group">
                    <label for="day-preset">Preset</label>
                    <select id="day-preset" name="SETTING_PRESET">
                        <option value="default">Solar (Default)</option>
                        <option value="orangeDreams">Orange Dreams</option>
                        <option value="terminalGreen">Terminal Green</option>
                        <option value="lightOceanTheme">Light Ocean</option>
                        <option value="roseTheme">Rose Theme</option>
                        <option value="fireworkTheme">Firework</option>
                        <option value="oceanTheme">Ocean Theme</option>
                        <option value="mauveTheme">Mauve Alert</option>
                        <option value="sandTheme">Sand</option>
                        <option value="greyTheme">Grey</option>
                        <option value="userTeal1">User Teal 1</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>

                 <div class="custom-colors" id="day-custom-colors">
                     <h3>Custom Colors</h3>
                     <div class="color-grid">
                     </div>
                 </div>
            </section>

            <!-- Night Theme Section -->
            <section class="config-section">
                <h2>Theme (Night)</h2>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="SETTING_USE_NIGHT_THEME" name="SETTING_USE_NIGHT_THEME">
                        Enable night theme
                    </label>
                    <p class="description">If enabled, the selected theme will be used between sunset and sunrise</p>
                </div>

                <div class="form-group">
                    <label for="night-preset">Preset</label>
                    <select id="night-preset" name="SETTING_NIGHT_PRESET">
                        <option value="default">Solar (Default)</option>
                        <option value="orangeDreams">Orange Dreams</option>
                        <option value="terminalGreen">Terminal Green</option>
                        <option value="lightOceanTheme">Light Ocean</option>
                        <option value="roseTheme">Rose Theme</option>
                        <option value="fireworkTheme">Firework</option>
                        <option value="oceanTheme">Ocean Theme</option>
                        <option value="mauveTheme">Mauve Alert</option>
                        <option value="sandTheme">Sand</option>
                        <option value="greyTheme">Grey</option>
                        <option value="userTeal1">User Teal 1</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>

                 <div class="custom-colors" id="night-custom-colors">
                     <h3>Custom Night Colors</h3>
                     <div class="color-grid">
                     </div>
                 </div>
            </section>

            <!-- Appearance Section -->
            <section class="config-section">
                <h2>Appearance</h2>
                
                <div class="form-group">
                    <label for="SETTING_PIP_VISIBILITY">Dial Markings</label>
                    <select id="SETTING_PIP_VISIBILITY" name="SETTING_PIP_VISIBILITY">
                        <option value="0">All (every hour)</option>
                        <option value="1">Only major (every 3 hours)</option>
                        <option value="2">None</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="SETTING_SHOW_LEADING_ZERO" name="SETTING_SHOW_LEADING_ZERO">
                        Show leading zero
                    </label>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="SETTING_USE_LARGE_FONTS" name="SETTING_USE_LARGE_FONTS">
                        Use larger font size
                    </label>
                </div>
            </section>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </div>
        </form>
    </div>

    <!-- Color Picker Modal -->
    <div id="color-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Choose a Pebble Color</h3>
                <button type="button" class="modal-close">&times;</button>
            </div>
            <div id="color-grid-modal" class="color-grid-modal">
                <!-- Color swatches will be dynamically added here -->
            </div>
        </div>
    </div>

    <script src="config.js"></script>
</body>
</html>
